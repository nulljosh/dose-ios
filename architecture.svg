<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, sans-serif">
  <rect width="800" height="420" fill="#f5f5f7" rx="16"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#1d1d1f">Dose iOS -- Architecture</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#10b981"/>
    </marker>
  </defs>

  <!-- SwiftUI Views -->
  <rect x="40" y="70" width="200" height="280" rx="12" fill="white" stroke="#d2d2d7" stroke-width="1.5"/>
  <text x="140" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#1d1d1f">SwiftUI Views</text>

  <rect x="60" y="114" width="160" height="34" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="140" y="136" text-anchor="middle" font-size="12" fill="#10b981">DashboardView</text>

  <rect x="60" y="156" width="160" height="34" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="140" y="178" text-anchor="middle" font-size="12" fill="#10b981">LogView</text>

  <rect x="60" y="198" width="160" height="34" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="140" y="220" text-anchor="middle" font-size="12" fill="#10b981">HistoryView</text>

  <rect x="60" y="240" width="160" height="34" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="140" y="262" text-anchor="middle" font-size="12" fill="#10b981">HealthView</text>

  <rect x="60" y="282" width="160" height="34" rx="8" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1"/>
  <text x="140" y="304" text-anchor="middle" font-size="12" fill="#6e6e73">ContentView / TabView</text>

  <!-- Arrow: Views -> DataStore -->
  <line x1="240" y1="200" x2="298" y2="200" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DataStore -->
  <rect x="300" y="100" width="200" height="220" rx="12" fill="white" stroke="#d2d2d7" stroke-width="1.5"/>
  <text x="400" y="130" text-anchor="middle" font-size="13" font-weight="600" fill="#1d1d1f">DataStore</text>
  <text x="400" y="150" text-anchor="middle" font-size="11" fill="#6e6e73">@Observable</text>

  <text x="400" y="178" text-anchor="middle" font-size="11" fill="#1d1d1f">substances: [Substance]</text>
  <text x="400" y="198" text-anchor="middle" font-size="11" fill="#1d1d1f">doseEntries: [DoseEntry]</text>
  <text x="400" y="218" text-anchor="middle" font-size="11" fill="#1d1d1f">healthEntries: [HealthEntry]</text>

  <line x1="320" y1="235" x2="480" y2="235" stroke="#e5e5ea" stroke-width="1"/>

  <text x="400" y="258" text-anchor="middle" font-size="11" fill="#6e6e73">logDose()</text>
  <text x="400" y="278" text-anchor="middle" font-size="11" fill="#6e6e73">addSubstance()</text>
  <text x="400" y="298" text-anchor="middle" font-size="11" fill="#6e6e73">logHealth()</text>

  <!-- Arrow: DataStore -> Models -->
  <line x1="500" y1="200" x2="558" y2="200" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Models -->
  <rect x="560" y="100" width="200" height="220" rx="12" fill="white" stroke="#d2d2d7" stroke-width="1.5"/>
  <text x="660" y="130" text-anchor="middle" font-size="13" font-weight="600" fill="#1d1d1f">Models</text>
  <text x="660" y="150" text-anchor="middle" font-size="11" fill="#6e6e73">Codable + Identifiable</text>

  <rect x="580" y="166" width="160" height="34" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="660" y="188" text-anchor="middle" font-size="12" fill="#10b981">Substance</text>

  <rect x="580" y="208" width="160" height="34" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="660" y="230" text-anchor="middle" font-size="12" fill="#10b981">DoseEntry</text>

  <rect x="580" y="250" width="160" height="34" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="660" y="272" text-anchor="middle" font-size="12" fill="#10b981">HealthEntry</text>

  <!-- Persistence note -->
  <rect x="300" y="350" width="200" height="50" rx="10" fill="white" stroke="#d2d2d7" stroke-width="1.5"/>
  <text x="400" y="372" text-anchor="middle" font-size="12" font-weight="600" fill="#1d1d1f">UserDefaults</text>
  <text x="400" y="390" text-anchor="middle" font-size="10" fill="#6e6e73">JSON persistence</text>

  <line x1="400" y1="320" x2="400" y2="348" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>