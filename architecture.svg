<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: #fff;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#86868b"/>
    </marker>
  </defs>

  <text x="400" y="32" text-anchor="middle" style="font-size: 18px; font-weight: 600; fill: #1d1d1f;">Dose iOS Architecture</text>

  <!-- Views Layer -->
  <rect x="40" y="60" width="720" height="100" rx="12" style="fill: #f5f5f7; stroke: #d2d2d7; stroke-width: 1;"/>
  <text x="60" y="82" style="font-size: 11px; font-weight: 600; fill: #86868b; letter-spacing: 0.5px;">VIEWS</text>
  <rect x="60" y="92" width="90" height="52" rx="8" style="fill: #fff; stroke: #d2d2d7; stroke-width: 1;"/>
  <text x="105" y="122" text-anchor="middle" style="font-size: 11px; fill: #1d1d1f;">Dashboard</text>
  <rect x="160" y="92" width="80" height="52" rx="8" style="fill: #fff; stroke: #d2d2d7; stroke-width: 1;"/>
  <text x="200" y="122" text-anchor="middle" style="font-size: 11px; fill: #1d1d1f;">Library</text>
  <rect x="250" y="92" width="80" height="52" rx="8" style="fill: #fff; stroke: #d2d2d7; stroke-width: 1;"/>
  <text x="290" y="122" text-anchor="middle" style="font-size: 11px; fill: #1d1d1f;">History</text>
  <rect x="340" y="92" width="80" height="52" rx="8" style="fill: #fff; stroke: #d2d2d7; stroke-width: 1;"/>
  <text x="380" y="122" text-anchor="middle" style="font-size: 11px; fill: #1d1d1f;">Insights</text>
  <rect x="430" y="92" width="70" height="52" rx="8" style="fill: #fff; stroke: #d2d2d7; stroke-width: 1;"/>
  <text x="465" y="122" text-anchor="middle" style="font-size: 11px; fill: #1d1d1f;">Body</text>
  <rect x="510" y="92" width="100" height="52" rx="8" style="fill: #fff; stroke: #d2d2d7; stroke-width: 1;"/>
  <text x="560" y="122" text-anchor="middle" style="font-size: 11px; fill: #1d1d1f;">Interactions</text>
  <rect x="620" y="92" width="60" height="52" rx="8" style="fill: #fff; stroke: #d2d2d7; stroke-width: 1;"/>
  <text x="650" y="122" text-anchor="middle" style="font-size: 11px; fill: #1d1d1f;">Log</text>
  <rect x="690" y="92" width="56" height="52" rx="8" style="fill: #fff; stroke: #d2d2d7; stroke-width: 1;"/>
  <text x="718" y="122" text-anchor="middle" style="font-size: 11px; fill: #1d1d1f;">Detail</text>

  <!-- Arrow Views -> Services -->
  <line x1="400" y1="160" x2="400" y2="200" style="stroke: #86868b; stroke-width: 1.5;" marker-end="url(#arr)"/>

  <!-- Services Layer -->
  <rect x="40" y="210" width="720" height="90" rx="12" style="fill: #f5f5f7; stroke: #d2d2d7; stroke-width: 1;"/>
  <text x="60" y="232" style="font-size: 11px; font-weight: 600; fill: #86868b; letter-spacing: 0.5px;">SERVICES</text>
  <rect x="60" y="242" width="140" height="44" rx="8" style="fill: #0071e3; stroke: none;"/>
  <text x="130" y="268" text-anchor="middle" style="font-size: 12px; fill: #fff; font-weight: 500;">DataStore</text>
  <rect x="220" y="242" width="160" height="44" rx="8" style="fill: #0071e3; stroke: none;"/>
  <text x="300" y="268" text-anchor="middle" style="font-size: 12px; fill: #fff; font-weight: 500;">HealthKitService</text>
  <rect x="400" y="242" width="170" height="44" rx="8" style="fill: #0071e3; stroke: none;"/>
  <text x="485" y="268" text-anchor="middle" style="font-size: 12px; fill: #fff; font-weight: 500;">InteractionEngine</text>
  <rect x="590" y="242" width="150" height="44" rx="8" style="fill: #0071e3; stroke: none;"/>
  <text x="665" y="268" text-anchor="middle" style="font-size: 12px; fill: #fff; font-weight: 500;">CSVExporter</text>

  <!-- Arrow Services -> Models -->
  <line x1="250" y1="300" x2="250" y2="340" style="stroke: #86868b; stroke-width: 1.5;" marker-end="url(#arr)"/>

  <!-- Models Layer -->
  <rect x="40" y="350" width="440" height="90" rx="12" style="fill: #f5f5f7; stroke: #d2d2d7; stroke-width: 1;"/>
  <text x="60" y="372" style="font-size: 11px; font-weight: 600; fill: #86868b; letter-spacing: 0.5px;">MODELS</text>
  <rect x="60" y="382" width="95" height="44" rx="8" style="fill: #fff; stroke: #d2d2d7; stroke-width: 1;"/>
  <text x="107" y="408" text-anchor="middle" style="font-size: 11px; fill: #1d1d1f;">Substance</text>
  <rect x="165" y="382" width="95" height="44" rx="8" style="fill: #fff; stroke: #d2d2d7; stroke-width: 1;"/>
  <text x="212" y="408" text-anchor="middle" style="font-size: 11px; fill: #1d1d1f;">DoseEntry</text>
  <rect x="270" y="382" width="100" height="44" rx="8" style="fill: #fff; stroke: #d2d2d7; stroke-width: 1;"/>
  <text x="320" y="408" text-anchor="middle" style="font-size: 11px; fill: #1d1d1f;">HealthEntry</text>
  <rect x="380" y="382" width="86" height="44" rx="8" style="fill: #fff; stroke: #d2d2d7; stroke-width: 1;"/>
  <text x="423" y="408" text-anchor="middle" style="font-size: 11px; fill: #1d1d1f;">Biometric</text>

  <!-- Storage Layer -->
  <rect x="500" y="350" width="260" height="90" rx="12" style="fill: #f5f5f7; stroke: #d2d2d7; stroke-width: 1;"/>
  <text x="520" y="372" style="font-size: 11px; font-weight: 600; fill: #86868b; letter-spacing: 0.5px;">STORAGE</text>
  <rect x="520" y="382" width="100" height="44" rx="8" style="fill: #34c759; stroke: none;"/>
  <text x="570" y="408" text-anchor="middle" style="font-size: 12px; fill: #fff; font-weight: 500;">UserDefaults</text>
  <rect x="640" y="382" width="100" height="44" rx="8" style="fill: #ff3b30; stroke: none;"/>
  <text x="690" y="408" text-anchor="middle" style="font-size: 12px; fill: #fff; font-weight: 500;">HealthKit</text>

  <!-- Arrow DataStore -> UserDefaults -->
  <path d="M130,286 L130,330 L570,330 L570,380" style="stroke: #86868b; stroke-width: 1.5; fill: none;" marker-end="url(#arr)"/>

  <!-- Arrow HealthKitService -> HealthKit -->
  <path d="M300,286 L300,318 L690,318 L690,380" style="stroke: #86868b; stroke-width: 1.5; fill: none;" marker-end="url(#arr)"/>

  <!-- Data -->
  <rect x="40" y="460" width="200" height="44" rx="8" style="fill: #f5f5f7; stroke: #d2d2d7; stroke-width: 1;"/>
  <text x="140" y="486" text-anchor="middle" style="font-size: 11px; fill: #1d1d1f;">SubstanceDatabase (200+)</text>
  <line x1="140" y1="440" x2="140" y2="458" style="stroke: #86868b; stroke-width: 1.5;" marker-end="url(#arr)"/>
</svg>
