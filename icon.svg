<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="32" fill="#f5f5f7" stroke="#d1d5db" stroke-width="1"/>
  <!-- Phone frame -->
  <rect x="60" y="35" width="80" height="130" rx="12" fill="none" stroke="#10b981" stroke-width="2" opacity="0.6"/>
  <rect x="85" y="40" width="30" height="4" rx="2" fill="#10b981" opacity="0.3"/>
  <!-- Pill capsule -->
  <rect x="82" y="72" width="36" height="18" rx="9" fill="none" stroke="#10b981" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="72" x2="100" y2="90" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>
  <rect x="82" y="72" width="18" height="18" rx="9" fill="#10b981" opacity="0.3"/>
  <!-- Plus sign -->
  <line x1="100" y1="100" x2="100" y2="120" stroke="#10b981" stroke-width="2" opacity="0.5"/>
  <line x1="90" y1="110" x2="110" y2="110" stroke="#10b981" stroke-width="2" opacity="0.5"/>
  <!-- Check mark -->
  <polyline points="88,135 96,143 112,127" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
</svg>